name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create venv on the matrix Python
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install project + dev deps (includes crewai)
        # Installs into the .venv created above. Pulling in crewai here makes the
        # compatibility smoke test actually run: it asserts CrewAI still exposes the
        # before_llm_call / after_llm_call hook symbols the adapter depends on.
        run: uv pip install ".[dev]"

      - name: Lint
        run: uv run ruff check src tests

      - name: Run tests (unit + CrewAI compatibility smoke test)
        run: uv run pytest -q

  build:
    name: build + twine check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel
        run: uv build
      - name: Validate distributions
        run: uvx twine check dist/*
