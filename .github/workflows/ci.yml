name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install project + dev deps (includes crewai)
        # Installing crewai here makes the offline compatibility smoke test actually run:
        # it asserts CrewAI still exposes before_llm_call / after_llm_call hook symbols.
        run: uv pip install --system ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Run tests (unit + CrewAI compatibility smoke test)
        run: pytest -q

  build:
    name: build + twine check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - name: Build sdist + wheel
        run: uv build
      - name: Validate distributions
        run: |
          uv pip install --system twine
          twine check dist/*
